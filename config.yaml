scheduler:
  name: "gpu-scheduler"
  port: 8888
  metricsPort: 9090
  mode: "standalone"
  preemptionEnabled: true
  checkpointTimeoutSeconds: 60
  preemptionGracePeriod: 30
  autoResumeMaxRetries: 3
  autoResumePriorityBoost: 5

queue:
  maxSize: 1000
  defaultPolicy: "fifo"

gpu:
  pollIntervalSeconds: 5
  mockMode: false

kubernetes:
  kubeconfig: "/etc/rancher/k3s/k3s.yaml"
  namespace: "default"

logging:
  level: "info"
  format: "json"

workflows:
  enabled: true
  allowCustom: true
  defaultPriority: 50
  types:
    - name: "inference"
      priority: 90
      preemptible: false
    - name: "training"
      priority: 70
      preemptible: true
    - name: "build"
      priority: 40
      preemptible: true
  
proxy:
  enabled: true
  port: 8080
  scheduler_url: "http://localhost:8888"

rebalancing:
  enabled: true
  dry_run: true
  tick_interval_seconds: 5
  sustain_window_seconds: 15
  cooldown_seconds: 60
  allow_scale_up: true
  allow_scale_down: false

  model_groups:
    - name: "Qwen/Qwen2.5-7B-Instruct"
      ttft_hot_ms: 200
      itl_hot_ms: 80
      max_prefill_workers: 2
      max_decode_workers: 2
      execution_script: "examples/inference/inference-disagg-rebalance.sh"

    - name: "Qwen/Qwen2.5-14B-Instruct"
      ttft_hot_ms: 400
      itl_hot_ms: 120
      max_prefill_workers: 2
      max_decode_workers: 1
      execution_script: ""
