scheduler:
  name: "gpu-scheduler"
  port: 8888
  metricsPort: 9090
  mode: "standalone"

queue:
  maxSize: 1000
  defaultPolicy: "fifo"  # fifo | binpack

gpu:
  pollIntervalSeconds: 5
  mockMode: false  # set false in production

workflows:
  enabled: true
  allowCustom: true
  defaultPriority: 50
  types:
    - name: "inference"
      priority: 100
      preemptible: false
    - name: "training"
      priority: 50
      preemptible: false
    - name: "build"
      priority: 10
      preemptible: true

kubernetes:
  kubeconfig: ""  # empty = in-cluster
  namespace: "default"

logging:
  level: "info"  # debug | info | warn | error
  format: "json"  # json | text