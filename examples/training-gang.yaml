# training-gang.yaml — apply all 4 at once
apiVersion: v1
kind: Pod
metadata:
  name: ddp-worker-0
  labels:
    gpu-scheduler.io/pool: "mig"
  annotations:
    gpu-scheduler/gang-id: "ddp-training-001"
    gpu-scheduler/gang-size: "4"
    gpu-scheduler/memory-mb: "10240"
    gpu-scheduler/workflow: "training"
    gpu-scheduler/preemptible: "true"
    gpu-scheduler/checkpoint-cmd: "python3 -c 'import json; json.dump({\"epoch\":5,\"loss\":0.23}, open(\"/tmp/checkpoint.json\",\"w\")); print(\"CHECKPOINT SAVED\")'"
spec:
  schedulerName: gpu-scheduler
  containers:
  - name: worker
    image: nvcr.io/nvidia/pytorch:24.01-py3
    command: ["/bin/bash", "-c"]
    args:
      - |
        echo "DDP Worker 0 starting on MIG instance..."
        echo "Training epoch 1/10..."
        python -c "
        import torch, time, os
        dev = torch.device('cuda')
        # Allocate ~2GB to simulate training
        tensors = [torch.randn(1024, 1024, device=dev) for _ in range(8)]
        for epoch in range(1, 11):
            # Simulate training step
            for t in tensors:
                t = t @ t.T
            print(f'[Worker 0] Epoch {epoch}/10 complete, loss={1.0/(epoch+1):.4f}')
            time.sleep(15)
        print('Training complete!')
        "
    resources:
      limits:
        nvidia.com/gpu: "1"
  restartPolicy: Never
---
