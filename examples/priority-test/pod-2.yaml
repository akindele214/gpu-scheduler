apiVersion: v1
kind: Pod
metadata:
  name: high-priority-job
  annotations:
    gpu-scheduler/memory-mb: "8192"
    gpu-scheduler/workflow: "build"
    gpu-scheduler/priority: "95"
spec:
  schedulerName: gpu-scheduler
  containers:
  - name: gpu-worker
    image: nvcr.io/nvidia/cuda:12.0.0-devel-ubuntu22.04
    command: ["/bin/bash", "-c"]
    args:
      - |
        cat <<'CUDA' > /tmp/alloc.cu
        #include <stdio.h>
        #include <unistd.h>
        #include <cuda_runtime.h>
        int main() {
            size_t bytes = 4ULL * 1024 * 1024 * 1024;
            void *ptr;
            cudaError_t err = cudaMalloc(&ptr, bytes);
            if (err != cudaSuccess) { printf("failed: %s\n", cudaGetErrorString(err)); return 1; }
            printf("High-priority: Allocated 4GB. Holding 120s...\n");
            sleep(120);
            cudaFree(ptr);
            return 0;
        }
        CUDA
        nvcc /tmp/alloc.cu -o /tmp/alloc && /tmp/alloc
    resources:
      limits:
        nvidia.com/gpu: "1"
  restartPolicy: Never
