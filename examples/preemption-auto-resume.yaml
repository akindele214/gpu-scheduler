# preemption-auto-resume.yaml
# Test scenario: submit the low-priority training pod first, then the
# high-priority inference pod. The training pod will be checkpointed,
# evicted, and automatically resumed with a boosted priority.
#
# Step 1: kubectl apply -f examples/preemption-auto-resume.yaml
# Step 2: Wait for training-resumable to start running
# Step 3: kubectl apply -f examples/preemption-auto-resume.yaml --selector=tier=high
#         (or just apply the whole file — the high-priority pod triggers preemption)
#
# Expected behavior:
#   1. training-resumable runs on a GPU
#   2. high-priority-inference arrives, needs the same GPU
#   3. Scheduler checkpoints training-resumable (runs checkpoint-cmd)
#   4. Scheduler evicts training-resumable
#   5. Scheduler auto-creates training-resumable-resume-1 with priority 55 (50 + 5 boost)
#   6. high-priority-inference gets scheduled
#   7. training-resumable-resume-1 waits in pending until GPU is free

---
# Low-priority preemptible training pod with auto-resume
apiVersion: v1
kind: Pod
metadata:
  name: training-resumable
  annotations:
    gpu-scheduler/memory-mb: "4096"
    gpu-scheduler/workflow: "training"
    gpu-scheduler/priority: "50"
    gpu-scheduler/preemptible: "true"
    gpu-scheduler/auto-resume: "true"
    gpu-scheduler/checkpoint-cmd: "echo 'CHECKPOINT: saving model to /tmp/checkpoint.pt'"
    gpu-scheduler/resume-cmd: "echo 'RESUME: loading model from /tmp/checkpoint.pt'"
spec:
  schedulerName: gpu-scheduler
  containers:
  - name: trainer
    image: nvcr.io/nvidia/pytorch:24.01-py3
    command: ["/bin/bash", "-c"]
    args:
      - |
        echo "Training job starting..."
        python3 -c "
        import time
        for epoch in range(1, 101):
            print(f'[training-resumable] Epoch {epoch}/100, loss={1.0/(epoch+1):.4f}')
            time.sleep(10)
        print('Training complete!')
        "
    resources:
      limits:
        nvidia.com/gpu: "1"
  restartPolicy: Never
---
# High-priority inference pod that triggers preemption
apiVersion: v1
kind: Pod
metadata:
  name: high-priority-inference
  annotations:
    gpu-scheduler/memory-mb: "4096"
    gpu-scheduler/workflow: "inference"
    gpu-scheduler/priority: "90"
spec:
  schedulerName: gpu-scheduler
  containers:
  - name: inference
    image: nvcr.io/nvidia/pytorch:24.01-py3
    command: ["/bin/bash", "-c"]
    args:
      - |
        echo "Inference service starting..."
        python3 -c "
        import time
        print('Model loaded. Serving requests...')
        time.sleep(120)
        print('Inference complete.')
        "
    resources:
      limits:
        nvidia.com/gpu: "1"
  restartPolicy: Never
